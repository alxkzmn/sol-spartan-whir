[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
via_ir = true
optimizer = true
# Max value where WhirVerifier4 bytecode fits EIP-170 (24,576 bytes).
# At 500 the contract is 24,290 bytes (286 margin). At 501 it jumps to 25,526.
optimizer_runs = 500
fs_permissions = [
  { access = "read", path = "./testdata" }
]

[fmt]
line_length = 100
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
