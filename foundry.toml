[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
via_ir = true
optimizer = true
# Max value where WhirVerifier4 bytecode fits EIP-170 (24,576 bytes).
# At 800 the contract is 24,082 bytes (494 margin). At 840 it jumps to 24,582.
optimizer_runs = 800
fs_permissions = [
  { access = "read", path = "./testdata" }
]

[fmt]
line_length = 100
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
