[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
via_ir = true
optimizer = true
# Deployable setting used on the linearized-merkle branch.
optimizer_runs = 500
fs_permissions = [
  { access = "read", path = "./testdata" }
]

[fmt]
line_length = 100
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
